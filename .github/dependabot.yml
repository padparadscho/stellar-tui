version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    assignees:
      - "padparadscho"
    labels:
      - "dependencies"
      - "rust"
    versioning-strategy: "lockfile-only"
    groups:
      rust-patch-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    assignees:
      - "padparadscho"
    labels:
      - "dependencies"
      - "github-actions"
